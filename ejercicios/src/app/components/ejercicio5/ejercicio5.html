<div class="contenedor">
    <button (click)="alternarEstilo()">
        {{ esEstiloModerno ? 'Estilo Clásico' : 'Estilo Moderno' }}
    </button>

    <div class="tarjeta" [ngClass]="{'moderno': esEstiloModerno, 'clasico': !esEstiloModerno}">
        <h3>Título de la Tarjeta</h3>
        <p>
            Esta es una tarjeta de contenido.
            Observa cómo cambia su estilo
            al hacer clic en el botón de arriba.
        </p>
    </div>
</div>
